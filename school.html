<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>School · BRASA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--cream:#F0EBDE;--ink:#1B1A17;--soft:#6B6658;--accent:#8C3A1F;--line:#D9D2C4;--card:#FBF8F1;--serif:'Fraunces',Georgia,serif;--sans:'Geist',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:760px;margin:0 auto;padding:0 clamp(1.25rem,5vw,2.5rem)}
  header.bar{position:sticky;top:0;z-index:10;background:rgba(240,235,222,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .bar-row{display:flex;align-items:center;justify-content:space-between;padding:1rem 0;max-width:760px;margin:0 auto;padding-left:clamp(1.25rem,5vw,2.5rem);padding-right:clamp(1.25rem,5vw,2.5rem)}
  .mark{font-family:var(--serif);font-weight:600;font-size:1.3rem;color:var(--accent)}
  .back{font-family:var(--sans);font-size:.85rem;font-weight:500;color:var(--soft);text-decoration:none;cursor:pointer;background:none;border:0}
  .back:hover{color:var(--ink)}
  .lead{padding:clamp(2.25rem,6vw,3.5rem) 0 1.25rem;border-bottom:1px solid var(--line)}
  .eyebrow{font-family:var(--sans);font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.7rem}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(1.9rem,4.5vw,2.9rem);line-height:1.06;letter-spacing:-.01em;color:var(--ink)}
  .sub{margin-top:.7rem;color:var(--soft);font-size:1rem}
  .facts{padding:1.6rem 0;border-bottom:1px solid var(--line)}
  .fact{display:flex;gap:1rem;padding:.55rem 0;border-bottom:1px solid var(--line)}
  .fact:last-child{border-bottom:0}
  .fact-k{flex:0 0 38%;font-family:var(--sans);font-size:.7rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--soft);padding-top:.15rem}
  .fact-v{flex:1;font-family:var(--serif);font-size:1.08rem;color:var(--ink)}
  .quote{font-family:var(--serif);font-style:italic;font-weight:300;font-size:1.15rem;line-height:1.4;color:var(--ink);padding:1.6rem 0;border-bottom:1px solid var(--line)}
  .actions{display:flex;flex-wrap:wrap;gap:.8rem;padding:1.6rem 0 0}
  .btn{font-family:var(--sans);font-size:.9rem;font-weight:600;text-decoration:none;border-radius:10px;padding:.7rem 1.1rem;border:1px solid var(--line)}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-ghost{background:var(--card);color:var(--ink)}
  .btn-soon{background:transparent;color:var(--soft);border-style:dashed;cursor:default}
  .state{padding:3rem .25rem;color:var(--soft);font-style:italic}
  footer{padding:2.5rem 0;margin-top:2rem;border-top:1px solid var(--line);color:var(--soft);font-size:.82rem}
</style>
</head>
<body>
<header class="bar"><div class="bar-row">
  <span class="mark">BRASA CR</span>
  <button class="back" onclick="goBack()">\u2190 Back</button>
</div></header>

<div class="wrap">
  <div id="content"><p class="state">Loading school\u2026</p></div>
  <footer id="foot"></footer>
</div>

<script>
function goBack(){ if(history.length>1){history.back();} else {location.href='schools.html';} }
const esc = s => String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const params = new URLSearchParams(location.search);
const slug = (params.get("slug") || "").trim();

function fact(k, v){ return v ? '<div class="fact"><div class="fact-k">'+esc(k)+'</div><div class="fact-v">'+esc(v)+'</div></div>' : ''; }

(async function(){
  const c = document.getElementById("content");
  if(!slug){ c.innerHTML = '<p class="state">No school specified.</p>'; return; }
  try{
    const res = await fetch("/api/school?slug=" + encodeURIComponent(slug));
    if(res.status === 404){ c.innerHTML = '<p class="state">School not found.</p>'; return; }
    if(!res.ok) throw new Error("HTTP " + res.status);
    const s = await res.json();
    if(s.error) throw new Error(s.error);

    const province = s.province || "Other regions";
    document.title = s.name + " \u00B7 BRASA";
    const subBits = [s.type, s.canton, province].filter(Boolean).join(" \u00B7 ");

    c.innerHTML =
      '<section class="lead">' +
        '<p class="eyebrow">' + esc(s.type || "Centro Educativo") + '</p>' +
        '<h1>' + esc(s.name) + '</h1>' +
        '<p class="sub">' + esc(subBits) + '</p>' +
      '</section>' +
      '<section class="facts">' +
        fact("Type", s.type) +
        fact("Cant\u00F3n", s.canton) +
        fact("Province", province) +
        fact("DRE region", s.dre) +
        fact("Registry ID", s.slug) +
      '</section>' +
      (s.tagline ? '<p class="quote">\u201C' + esc(s.tagline) + '\u201D</p>' : '') +
      '<section class="actions">' +
        '<a class="btn btn-ghost" href="schools.html?province=' + encodeURIComponent(s.province ? s.province : "Others") + '">\u2190 All schools in ' + esc(province) + '</a>' +
        '<span class="btn btn-soon" title="Coming in a later phase">Pay via SINPE \u00B7 soon</span>' +
      '</section>';
    document.getElementById("foot").textContent = "From the BRASA citizens registry \u00B7 " + (s.dre ? "DRE " + s.dre : "Schools of Costa Rica");
  }catch(err){
    c.innerHTML = '<p class="state">Couldn\u2019t load this school (' + esc(err.message||err) + ').</p>';
  }
})();
</script>
</body>
</html>
