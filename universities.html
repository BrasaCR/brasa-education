<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASA CR — The Universities</title>

<style>
:root{
  --ink:#1B1A17; --ink-soft:#6B6862; --ink-mute:#6B6862; --ink-faint:#A19E97;
  --accent:#8C3A1F; --page:#FBF9F4; --cream:#F5F2EB; --line:rgba(27,26,23,0.12);
  --serif:'Fraunces','Times New Roman',serif; --sans:'Geist','Helvetica Neue',system-ui,sans-serif;
  --max-w:1320px; --gutter:clamp(1.25rem,4vw,2.75rem);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--page);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
img{display:block;max-width:100%;}
.wrap{max-width:var(--max-w);margin:0 auto;padding:0 var(--gutter);}

/* header — matches BRASA CR cross-surface bar */
header.site{position:sticky;top:0;z-index:50;background:rgba(251,249,244,0.92);backdrop-filter:blur(10px);border-bottom:0.5px solid var(--line);}
header.site .bar{display:flex;align-items:center;justify-content:space-between;height:72px;gap:1rem;}
.brand{display:flex;align-items:center;gap:0.7rem;}
.brand img{width:38px;height:38px;border-radius:8px;}
.brand .wm{font-family:var(--serif);font-weight:500;font-size:1.4rem;letter-spacing:0.01em;color:var(--accent);}
nav.surfaces{display:flex;gap:1.6rem;}
nav.surfaces a{font-size:0.9rem;color:var(--ink-soft);letter-spacing:0.005em;}
nav.surfaces a:hover{color:var(--accent);}
@media(max-width:720px){nav.surfaces{display:none;}}

/* landing region tiles */
.hero{padding:clamp(3rem,7vw,5rem) 0 clamp(1.5rem,3vw,2.5rem);}
.hero-eyebrow{font-family:var(--sans);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:14px;}
.hero h1{font-family:var(--serif);font-weight:300;font-size:clamp(2.4rem,6vw,4.4rem);line-height:0.98;letter-spacing:-0.025em;max-width:15ch;}
.hero p{margin-top:1.1rem;max-width:56ch;color:var(--ink-soft);font-size:1.05rem;}
.hero .gstats{margin-top:1.3rem;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faint);}
.hero .gstats b{color:var(--ink);}
.regions{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem;padding-bottom:clamp(3rem,7vw,6rem);}
.region-tile{position:relative;display:flex;flex-direction:column;justify-content:flex-end;min-height:280px;padding:1.6rem;overflow:hidden;color:#fff;isolation:isolate;transition:transform .5s cubic-bezier(0.22,0.61,0.36,1);border-top:3px solid currentColor;}
.region-tile::before{content:"";position:absolute;inset:0;z-index:-2;background:var(--rc) url('https://assets.brasa.world/Thumbnails/world-map-regions.jpg') center/cover no-repeat;}
.region-tile::after{content:"";position:absolute;inset:0;z-index:-1;background:linear-gradient(165deg,rgba(0,0,0,0.05) 35%,rgba(0,0,0,0.5) 100%);}
.region-tile:hover{transform:translateY(-4px);}
.region-tile .rt-num{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;opacity:0.9;font-weight:600;}
.region-tile h2{font-family:var(--serif);font-weight:300;font-size:2rem;line-height:1.02;margin:0.55rem 0 0.7rem;letter-spacing:-0.015em;}
.region-tile .rt-tag{font-size:0.92rem;opacity:0.92;line-height:1.45;margin-bottom:1.1rem;max-width:34ch;}
.region-tile .rt-stats{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.95;border-top:1px solid rgba(255,255,255,0.3);padding-top:0.85rem;}

/* continent detail — faithful to index523 */
.back-link{display:inline-block;font-family:var(--sans);font-size:14px;color:var(--ink-mute);letter-spacing:0;margin:32px 0 18px;cursor:pointer;transition:color .18s ease,transform .18s ease;}
.back-link:hover{color:var(--ink);transform:translateX(-3px);}
.continent-hero{position:relative;margin:8px 0 40px;padding:48px 0 38px;border-top:3px solid currentColor;border-bottom:0.5px solid var(--line);}
.continent-hero-eyebrow{font-family:var(--sans);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px;}
.continent-hero-title{font-family:var(--serif);font-weight:400;font-size:clamp(2.6rem,8vw,88px);letter-spacing:-0.03em;line-height:0.95;margin-bottom:18px;color:inherit;}
.continent-hero-tag{font-family:var(--serif);font-size:clamp(1rem,2.2vw,22px);color:var(--ink-soft);max-width:760px;letter-spacing:-0.005em;}
.continent-hero-stats{font-family:var(--sans);font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faint);margin-top:22px;}
.country-vertical{margin-bottom:56px;}
.country-vertical .eyebrow{display:flex;align-items:baseline;justify-content:space-between;gap:12px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:16px;font-weight:500;}
.country-vertical .eyebrow .count{color:var(--ink-faint);letter-spacing:0.12em;}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
@media(max-width:900px){.grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr);gap:6px;}}
.uni-tile{position:relative;aspect-ratio:4/3;background:#ECE6D8;border:0.5px solid rgba(27,26,23,0.06);cursor:pointer;transition:background .25s ease;overflow:hidden;display:flex;flex-direction:column;text-decoration:none;color:inherit;}
.uni-tile:hover{background:#E4DCC9;}
.uni-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:currentColor;opacity:0.85;z-index:2;}
.uni-tile-logo-wrap{flex:1 1 auto;display:flex;align-items:center;justify-content:center;padding:12px 12px 6px;min-height:0;background:#fff;}
.uni-tile-logo{max-width:100%;max-height:100%;object-fit:contain;display:block;opacity:0;transition:opacity .18s ease;}
.uni-tile-logo.on{opacity:1;}
.uni-tile-logo.fail{display:none;}
.uni-tile-text{padding:8px 12px 12px;text-align:center;border-top:0.5px solid rgba(27,26,23,0.06);background:var(--cream);}
.uni-tile-name{font-family:var(--serif);font-size:12px;font-weight:400;color:var(--ink);letter-spacing:-0.005em;line-height:1.18;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.uni-tile-meta{font-family:var(--sans);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-faint);}
.uni-tile-color-americas{color:rgb(28,52,98);} .uni-tile-color-europe{color:rgb(36,72,52);}
.uni-tile-color-asia{color:rgb(120,28,40);} .uni-tile-color-africa{color:rgb(155,95,30);} .uni-tile-color-oceania{color:rgb(85,42,92);}
.continent-c-americas{color:rgb(28,52,98);} .continent-c-europe{color:rgb(36,72,52);}
.continent-c-asia{color:rgb(120,28,40);} .continent-c-africa{color:rgb(155,95,30);} .continent-c-oceania{color:rgb(85,42,92);}

footer.site{border-top:0.5px solid var(--line);padding:2.5rem 0 3.5rem;margin-top:1rem;}
footer.site .frow{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:1rem;font-size:0.8rem;color:var(--ink-soft);}
footer.site a:hover{color:var(--accent);}
</style>
</head>

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt = n => n.toLocaleString('en-US');
const CC = cs => 'https://www.classcentral.com/university/' + cs;
function _uniLogoErr(img){ img.classList.add('fail'); }
window._uniLogoErr = _uniLogoErr;

function uniTile(u, slug){
  const ov = LOGO_OVERRIDES[u.cs];
  const logo = ov
    ? `<img class="uni-tile-logo on" src="${ov}" alt="">`
    : `<img class="uni-tile-logo" loading="lazy" src="https://assets.brasa.world/Thumbnails/${u.cs}-trn-sq.avif" alt="" onload="this.classList.add('on')" onerror="_uniLogoErr(this)">`;
  return `<a class="uni-tile uni-tile-color-${slug}" target="_blank" rel="noopener" href="${CC(u.cs)}">
    <div class="uni-tile-logo-wrap">${logo}</div>
    <div class="uni-tile-text">
      <div class="uni-tile-name">${esc(u.n)}</div>
      <div class="uni-tile-meta">${fmt(u.c)} course${u.c===1?'':'s'}</div>
    </div></a>`;
}

function viewHome(){
  const totU = CONT_DATA.reduce((s,r)=>s+r.universityCount,0);
  const totC = CONT_DATA.reduce((s,r)=>s+r.courseCount,0);
  const totCtry = CONT_DATA.reduce((s,r)=>s+r.countries.length,0);
  const tiles = CONT_DATA.map((r,i)=>`
    <a class="region-tile continent-c-${r.slug}" style="--rc:${r.color}" href="#region/${r.slug}">
      <div class="rt-num">Continent ${i+1} of ${CONT_DATA.length}</div>
      <h2>${r.name}</h2>
      <div class="rt-tag">${r.tag}</div>
      <div class="rt-stats">${fmt(r.universityCount)} schools · ${r.countries.length} countries · ${fmt(r.courseCount)} courses</div>
    </a>`).join('');
  return `
    <section class="hero">
      <div class="hero-eyebrow">The Universities</div>
      <h1>Every university, by region of the world.</h1>
      <p>${fmt(totU)} institutions across ${CONT_DATA.length} continents and ${totCtry} countries — each opening to its full course catalog on Class Central, free.</p>
      <div class="gstats"><b>${fmt(totU)}</b> SCHOOLS · <b>${fmt(totC)}</b> COURSES · <b>$0</b> COST</div>
    </section>
    <section class="regions">${tiles}</section>`;
}

function viewRegion(slug){
  const c = CONT_DATA.find(x=>x.slug===slug);
  if(!c) return viewHome();
  const verticals = c.countries.map(country=>{
    const tiles = country.universities.map(u=>uniTile(u, c.slug)).join('');
    return `<section class="country-vertical">
      <div class="eyebrow"><span>${esc(country.name)}</span><span class="count">${fmt(country.count)} schools · ${fmt(country.courses)} courses</span></div>
      <div class="grid">${tiles}</div>
    </section>`;
  }).join('');
  return `
    <a class="back-link" href="#">← All continents</a>
    <div class="continent-hero continent-c-${c.slug}">
      <div class="continent-hero-eyebrow">Continent ${CONT_DATA.indexOf(c)+1} of ${CONT_DATA.length}</div>
      <h1 class="continent-hero-title">${esc(c.name)}</h1>
      <p class="continent-hero-tag">${esc(c.tag)}</p>
      <div class="continent-hero-stats">${fmt(c.universityCount)} schools · ${c.countries.length} countries · ${fmt(c.courseCount)} courses</div>
    </div>
    ${verticals}`;
}

function render(){
  const h = location.hash.replace(/^#\/?/,'');
  const m = h.match(/^region\/(.+)$/);
  document.getElementById('app').innerHTML = m ? viewRegion(m[1]) : viewHome();
  window.scrollTo(0,0);
}
window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
